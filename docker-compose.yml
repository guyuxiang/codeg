services:
  codeg:
    image: ghcr.io/guyuxiang/codeg:latest
    ports:
      - "3080:3080"
    volumes:
      - codeg-data:/data
      - workspace-data:/workspace
      - ~/.ssh:/root/.ssh:ro
    environment:
      - CODEG_TOKEN=Aa123456@
      - CODEG_PORT=3080
      - CODEG_HOST=0.0.0.0
      - CODEG_HOME=/data
      - CODEG_DATA_DIR=/data
      - WORKSPACE_DATA=/workspace
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=no
    # Rewrite HTTPS to SSH for private GitLab
    command: >
      sh -c "
        git config --global url.'git@git.hrlyit.com:'.insteadOf 'https://git.hrlyit.com/'
        exec codeg-server
      "
    restart: unless-stopped

volumes:
  codeg-data:
  workspace-data:
