services:
  codeg:
    image: ghcr.io/guyuxiang/codeg:latest
    ports:
      - "3080:3080"
    volumes:
      - codeg-data:/data
      - workspace-data:/workspace
      # Git credentials for MCP clone
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
    environment:
      - CODEG_TOKEN=Aa123456@
      - CODEG_PORT=3080
      - CODEG_HOST=0.0.0.0
      - CODEG_HOME=/data
      - CODEG_DATA_DIR=/data
      - WORKSPACE_DATA=/workspace
    restart: unless-stopped

volumes:
  codeg-data:
  workspace-data:
